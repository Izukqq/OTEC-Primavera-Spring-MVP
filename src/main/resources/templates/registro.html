<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Registro - OTEC Primavera')}"></head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">

<div class="form-card" style="width: 100%; max-width: 420px;">
    <h2 style="text-align: center; margin-bottom: 1.5rem; color: #2c3e50;">
        Crear Cuenta
    </h2>
    <p style="text-align: center; color: #7f8c8d; margin-bottom: 1.5rem;">OTEC Primavera &mdash; Gestión Académica</p>

    <div th:if="${msgError}" class="alert alert-danger" th:text="${msgError}"></div>

    <form th:action="@{/registro}" th:object="${estudiante}" method="post">

        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ingrese su nombre" required autofocus>
        <p class="error-field" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" th:field="*{email}" placeholder="Ingrese su correo electrónico" required>
        <p class="error-field" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

        <label for="password">Contraseña</label>
        <input type="password" id="password" th:field="*{password}" placeholder="Ingrese su contraseña" required>
        <p class="error-field" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

        <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.7rem;">
                Registrarse
            </button>
        </div>

        <p style="text-align: center; margin-top: 1rem; color: #7f8c8d;">
            ¿Ya tienes cuenta?
            <a th:href="@{/login}" style="color: #1abc9c; font-weight: 600;">Iniciar Sesión</a>
        </p>
    </form>
</div>

</body>
</html>
