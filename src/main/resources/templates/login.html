<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login - OTEC Primavera')}"></head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">

<div class="form-card" style="width: 100%; max-width: 420px;">
    <h2 style="text-align: center; margin-bottom: 1.5rem; color: #2c3e50;">
        OTEC Primavera
    </h2>
    <p style="text-align: center; color: #7f8c8d; margin-bottom: 1.5rem;">Gestión Académica</p>

    <div th:if="${param.error}" class="alert alert-danger">
        Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Sesión cerrada exitosamente.
    </div>
    <div th:if="${param.denied}" class="alert alert-danger">
        No tiene permisos para acceder a esa sección.
    </div>
    <div th:if="${msgExito}" class="alert alert-success" th:text="${msgExito}"></div>

    <form th:action="@{/login}" method="post">

        <label for="username">Correo electrónico</label>
        <input type="text" id="username" name="username" placeholder="Ingrese su correo electrónico" required autofocus>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>

        <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.7rem;">
                Iniciar Sesión
            </button>
        </div>

        <p style="text-align: center; margin-top: 1rem; color: #7f8c8d;">
            ¿No tienes cuenta?
            <a th:href="@{/registro}" style="color: #1abc9c; font-weight: 600;">Regístrate aquí</a>
        </p>
    </form>
</div>

</body>
</html>
