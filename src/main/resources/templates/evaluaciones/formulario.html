<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Nueva Evaluación - OTEC Primavera')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2 style="margin-bottom: 1rem;">Crear Evaluación</h2>

    <div th:if="${msgError}" class="alert alert-danger" th:text="${msgError}"></div>

    <div class="form-card">
        <form th:action="@{/evaluaciones/guardar}" th:object="${evaluacion}" method="post">

            <label for="cursoId">Curso</label>
            <select id="cursoId" name="cursoId" required>
                <option value="">-- Seleccione un curso --</option>
                <option th:each="curso : ${cursos}"
                        th:value="${curso.id}"
                        th:text="${curso.nombre}">
                </option>
            </select>

            <label for="nombre">Nombre de la Evaluación</label>
            <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: Examen Final" required>
            <p class="error-field" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>

            <label for="descripcion">Descripción</label>
            <input type="text" id="descripcion" th:field="*{descripcion}" placeholder="Ej: Evaluación teórica del módulo 1">

            <div style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-success">Guardar Evaluación</button>
                <a th:href="@{/evaluaciones}" class="btn btn-primary" style="margin-left: 0.5rem;">Volver</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
